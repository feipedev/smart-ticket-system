<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Ticket System - Portfólio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- TOAST NOTIFICATIONS (Alertas na tela) -->
  <div id="toast-container"></div>

  <div class="app-container">
    
    <!-- ===========================
         TELA DE LOGIN / REGISTRO
    =========================== --->
    <div id="auth-view" class="auth-wrapper glass-panel">
      <div class="auth-header">
        <h1 class="gradient-text">TicketSys</h1>
        <p>Acesse ou crie sua conta para gerenciar ordens de serviço.</p>
      </div>

      <!-- Formulário Misto (Login ou Register) -->
      <form id="auth-form">
        <!-- Nome - Aparece apenas no Registro -->
        <div class="input-group hidden" id="group-name">
          <label for="name">Nome Completo</label>
          <input type="text" id="name" placeholder="Ex: João Silva">
        </div>

        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com">
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" id="btn-submit">Entrar no Sistema</button>
      </form>
      
      <button type="button" class="btn-secondary" id="btn-toggle-auth">
        Não tem uma conta? Cadastre-se
      </button>
    </div>

    <!-- ===========================
         TELA PRINCIPAL (DASHBOARD)
    =========================== --->
    <div id="dashboard-view" class="dashboard-wrapper hidden">
      
      <!-- Topbar -->
      <header class="topbar glass-panel">
        <h2 class="gradient-text" style="font-weight: 800;">TicketSys</h2>
        
        <div class="user-info">
          <span id="user-name-display" style="font-weight: 500;">Carregando...</span>
          <div class="avatar" id="user-avatar-display">U</div>
          <button id="btn-logout" style="background:none; border:none; color:var(--text-muted); cursor:pointer; text-decoration:underline;">Sair</button>
        </div>
      </header>

      <!-- Conteúdo Principal -->
      <main class="main-content">
        
        <!-- Sidebar: Criar Novo Ticket -->
        <aside class="sidebar glass-panel">
          <h3 style="margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.85rem; color: var(--text-muted);">Nova Ordem de Serviço</h3>
          
          <form id="ticket-form">
            <div class="input-group">
              <label>Título</label>
              <input type="text" id="ticket-title" required placeholder="Problema resumido">
            </div>
            
            <div class="input-group">
              <label>Descrição detalhada</label>
              <textarea id="ticket-desc" required rows="4" placeholder="Descreva o que aconteceu..."></textarea>
            </div>

            <div class="input-group" style="display:flex; gap: 1rem;">
              <div style="flex: 1;">
                 <label>Prioridade</label>
                 <select id="ticket-priority">
                   <option value="low">Baixa</option>
                   <option value="medium" selected>Média</option>
                   <option value="high">Alta</option>
                   <option value="urgent">Urgente</option>
                 </select>
              </div>
            </div>

            <button type="submit" class="btn-primary">Criar Ticket</button>
          </form>
        </aside>

        <!-- Área de Listagem de Tickets -->
        <section class="ticket-area glass-panel">
          <div class="ticket-header">
            <h3>Seus Chamados Abertos</h3>
            <button class="btn-secondary" id="btn-refresh" style="width:auto; margin:0; padding: 0.5rem 1rem;">Atualizar Lista</button>
          </div>

          <div id="ticket-list" class="ticket-list">
            <!-- Cards gerados via JS -->
            <p style="color: var(--text-muted);">Carregando tickets...</p>
          </div>
        </section>

      </main>
    </div>

  </div>

  <!-- Modal de Detalhes e Edição do Ticket -->
  <div id="ticket-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title" class="gradient-text">Detalhes da O.S.</h3>
        <button class="btn-close" id="btn-close-modal">&times;</button>
      </div>
      <form id="modal-form">
        <input type="hidden" id="modal-ticket-id">
        <div class="input-group">
          <label>Descrição</label>
          <div id="modal-desc" style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: var(--radius-md); font-size: 0.95rem; line-height: 1.5; max-height: 150px; overflow-y: auto; color: var(--text-muted);"></div>
        </div>
        <div class="input-group" style="display:flex; gap: 1rem;">
          <div style="flex: 1;">
            <label>Status</label>
            <select id="modal-status">
              <option value="open">Aberto</option>
              <option value="in_progress">Em Progresso</option>
              <option value="resolved">Resolvido</option>
              <option value="closed">Fechado</option>
            </select>
          </div>
          <div style="flex: 1;">
            <label>Prioridade</label>
            <select id="modal-priority">
              <option value="low">Baixa</option>
              <option value="medium">Média</option>
              <option value="high">Alta</option>
              <option value="urgent">Urgente</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">Salvar Alterações</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
